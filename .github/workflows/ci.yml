name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      # The built frontend is no longer committed; generate it into the backend's
      # static resources (mirrors the Dockerfile) so static-serving tests have it.
      - name: Build frontend into backend static
        run: |
          npm ci
          npm run build
          rm -rf backend/src/main/resources/static
          mkdir -p backend/src/main/resources/static
          cp -R dist/. backend/src/main/resources/static/
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        working-directory: backend
        # Live-network integration tests are excluded by default (see pom.xml).
        run: mvn -B test

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
